version: "3.8"

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: smartgate-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: smartgate_db
      POSTGRES_USER: smartgate_user
      POSTGRES_PASSWORD: smartgate_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    restart: unless-stopped

  db-adminer:
    image: adminer
    container_name: smartgate-adminer
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata:

